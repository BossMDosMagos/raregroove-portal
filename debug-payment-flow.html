<!DOCTYPE html>
<html>
<head>
  <title>Debug Payment Flow</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #000; color: #0f0; }
    pre { background: #111; padding: 10px; border: 1px solid #0f0; }
    .error { color: #f00; }
    .success { color: #0f0; }
    .warning { color: #ff0; }
  </style>
</head>
<body>
  <h1>🔍 Payment Flow Debugger</h1>
  <div id="output"></div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
    
    const supabaseUrl = 'https://gyhftjzqqzmwuhvqtvja.supabase.co'
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5aGZ0anpxcXptd3VodnF0dmphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzQwMTAwMjksImV4cCI6MjA0OTU4NjAyOX0.q4Yq3BRzj_RJz8FVPm4pN_zpWJzQ_QMmN39d6LuI3js'
    
    const supabase = createClient(supabaseUrl, supabaseKey)
    const output = document.getElementById('output')
    
    function log(msg, type = 'info') {
      const div = document.createElement('div')
      div.className = type
      div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`
      output.appendChild(div)
      console.log(msg)
    }

    async function debug() {
      log('🚀 Iniciando diagnóstico...')
      
      // 1. Verificar últimas transações
      log('<br>📦 1. Verificando transações recentes...')
      const { data: transactions, error: txError } = await supabase
        .from('transactions')
        .select('id, payment_id, status, created_at, total_amount, buyer_id, seller_id, item_id')
        .order('created_at', { ascending: false })
        .limit(5)
      
      if (txError) {
        log(`❌ Erro ao buscar transações: ${txError.message}`, 'error')
      } else if (transactions.length === 0) {
        log('⚠️ NENHUMA TRANSAÇÃO ENCONTRADA', 'warning')
      } else {
        log(`✅ ${transactions.length} transações encontradas:`, 'success')
        transactions.forEach(tx => {
          log(`  - TX ${tx.id.substring(0,8)}: R$ ${tx.total_amount} | ${tx.status} | ${new Date(tx.created_at).toLocaleString()}`)
        })
      }
      
      // 2. Verificar ledger
      log('<br>💰 2. Verificando ledger financeiro...')
      const { data: ledger, error: ledgerError } = await supabase
        .from('financial_ledger')
        .select('id, entry_type, amount, created_at, metadata')
        .order('created_at', { ascending: false })
        .limit(5)
      
      if (ledgerError) {
        log(`❌ Erro ao buscar ledger: ${ledgerError.message}`, 'error')
      } else if (ledger.length === 0) {
        log('⚠️ NENHUM REGISTRO NO LEDGER', 'warning')
      } else {
        log(`✅ ${ledger.length} registros no ledger:`, 'success')
        ledger.forEach(entry => {
          log(`  - ${entry.entry_type}: R$ ${entry.amount} | ${new Date(entry.created_at).toLocaleString()}`)
        })
      }
      
      // 3. Verificar itens vendidos
      log('<br>🎵 3. Verificando itens marcados como vendidos...')
      const { data: soldItems, error: itemsError } = await supabase
        .from('items')
        .select('id, title, is_sold, sold_date, sold_to_id, seller_id')
        .eq('is_sold', true)
        .order('sold_date', { ascending: false })
        .limit(5)
      
      if (itemsError) {
        log(`❌ Erro ao buscar itens: ${itemsError.message}`, 'error')
      } else if (soldItems.length === 0) {
        log('⚠️ NENHUM ITEM MARCADO COMO VENDIDO', 'warning')
      } else {
        log(`✅ ${soldItems.length} itens vendidos:`, 'success')
        soldItems.forEach(item => {
          log(`  - ${item.title.substring(0,30)}: vendido em ${new Date(item.sold_date).toLocaleString()}`)
        })
      }

      // 4. Testar edge function
      log('<br>🔧 4. Testando edge function process-transaction...')
      log('⚠️ Este teste criará uma transação FAKE - use apenas em dev!', 'warning')
      
      const testPayload = {
        transactionType: 'venda',
        buyerId: 'test-buyer-id',
        sellerId: 'test-seller-id',
        itemId: 'test-item-id',
        itemPrice: 100,
        shippingCost: 0,
        insuranceCost: 0,
        platformFee: 10,
        processingFee: 5,
        gatewayFee: 0,
        totalAmount: 115,
        netAmount: 90,
        paymentId: `TEST-${Date.now()}`,
        paymentProvider: 'test'
      }
      
      log(`📤 Enviando payload: ${JSON.stringify(testPayload, null, 2)}`)
      
      try {
        const { data, error } = await supabase.functions.invoke('process-transaction', {
          body: testPayload
        })
        
        if (error) {
          log(`❌ Erro na edge function: ${error.message}`, 'error')
          log(`Detalhes: ${JSON.stringify(error, null, 2)}`, 'error')
        } else {
          log(`✅ Edge function respondeu com sucesso!`, 'success')
          log(`Resposta: ${JSON.stringify(data, null, 2)}`)
        }
      } catch (err) {
        log(`❌ Exceção ao invocar: ${err.message}`, 'error')
      }
      
      log('<br>✅ Diagnóstico completo!')
    }
    
    debug()
  </script>
</body>
</html>
